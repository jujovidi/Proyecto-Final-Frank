<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario - CronoEdu</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <h1>CronoEdu - Horario Semanal</h1>
        <button id="btnAgregarMateria" class="btn-primary">+ Agregar Materia</button>
    </header>

    <main>
        <div id="calendar-container">
            <div id="calendar-grid"></div>
        </div>
    </main>

    <div id="modal-overlay" class="hidden">
        <div id="modal" class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Nueva Materia</h2>
                <button id="btnCerrarModal" class="btn-close">&times;</button>
            </div>
            <form id="materia-form">
                <input type="hidden" id="materia-id">

                <div class="form-group">
                    <label for="materia-nombre">Nombre de la Materia</label>
                    <input type="text" id="materia-nombre" required placeholder="Ej: Calculo I">
                </div>

                <div class="form-group">
                    <label for="materia-docente">Docente</label>
                    <input type="text" id="materia-docente" required placeholder="Ej: Juan Perez">
                </div>

                <div class="form-group">
                    <label for="materia-salon">Salon</label>
                    <input type="text" id="materia-salon" required placeholder="Ej: A-101">
                </div>

                <div class="form-group">
                    <label>Horarios</label>
                    <div id="horarios-container">
                        <div class="horario-entry">
                            <select class="horario-dia" required>
                                <option value="">Dia</option>
                                <option value="LUNES">Lunes</option>
                                <option value="MARTES">Martes</option>
                                <option value="MIERCOLES">Miercoles</option>
                                <option value="JUEVES">Jueves</option>
                                <option value="VIERNES">Viernes</option>
                                <option value="SABADO">Sabado</option>
                            </select>
                            <input type="time" class="horario-inicio" required value="08:00">
                            <input type="time" class="horario-fin" required value="10:00">
                            <button type="button" class="btn-remove-horario" title="Eliminar horario">&times;</button>
                        </div>
                    </div>
                    <button type="button" id="btnAgregarHorario" class="btn-secondary">+ Agregar horario</button>
                </div>

                <div class="modal-actions">
                    <button type="button" id="btnCancelar" class="btn-cancel">Cancelar</button>
                    <button type="submit" id="btnGuardar" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
