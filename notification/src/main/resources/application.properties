spring.application.name=notification
server.port=8081

# =========================================
# CONFIGURACION DE CORREO (JavaMail)
# =========================================
# Aqui van los datos de tu servidor SMTP
# Ejemplo con Gmail:
#   host -> smtp.gmail.com
#   port -> 587
#   username -> tu correo completo
#   password -> contraseña de aplicacion (no la normal)
# =========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TU_CORREO
spring.mail.password=TU_CONTRASENA
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================================
# CONFIGURACION DE TWILIO (SMS)
# =========================================
# Datos de tu cuenta de Twilio — formato obligatorio E.164
#   account-sid -> lo encuentras en el dashboard de Twilio
#   auth-token -> lo encuentras en el dashboard de Twilio
#   phone-number -> numero que te asigno Twilio (ej: +19522090582)
# =========================================
twilio.account-sid=ID_DE_TU_CUENTA_TWILIO
twilio.auth-token=TOKEN_DE_TWILIO
twilio.phone-number=+19522090582
